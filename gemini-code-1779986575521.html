<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventuras del Saber: Arrastra y Aprende</title>
    <style>
        :root {
            --verde: #4CAF50;
            --azul: #2196F3;
            --amarillo: #FFEB3B;
            --naranja: #FF9800;
            --rosado: #E91E63;
            --morado: #9C27B0;
            --blanco: #ffffff;
            --fuente-infantil: 'Comic Sans MS', 'Chalkboard SE', 'cursive';
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--fuente-infantil);
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
            min-height: 100vh;
            overflow-x: hidden;
            color: #333;
        }

        /* --- PORTADA PRINCIPAL --- */
        #portada {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: url('https://www.transparenttextures.com/patterns/kids-icons.png'), linear-gradient(135deg, #a8e063, #56ab2f);
            text-align: center;
            padding: 20px;
        }

        .titulo-app {
            font-size: 3.5rem;
            color: var(--blanco);
            text-shadow: 4px 4px 0px var(--naranja);
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        .info-docente {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 0 #ddd;
            margin: 20px 0;
        }

        .input-nombre {
            font-size: 1.5rem;
            padding: 15px;
            border-radius: 15px;
            border: 4px solid var(--azul);
            width: 300px;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-inicio {
            background: var(--rosado);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 0 #ad1457;
            transition: all 0.2s;
        }

        .btn-inicio:active { transform: translateY(5px); box-shadow: 0 5px 0 #ad1457; }

        /* --- ÁREA DE JUEGO --- */
        #juego { display: none; padding: 20px; }

        .header-juego {
            display: flex;
            justify-content: space-around;
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card { font-size: 1.2rem; font-weight: bold; }

        .instrucciones {
            text-align: center;
            font-size: 1.5rem;
            background: var(--amarillo);
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .zonas-container {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .zona {
            width: 180px;
            height: 180px;
            border: 4px dashed #666;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.7);
            transition: all 0.3s;
        }

        .zona.highlight { background: var(--amarillo); transform: scale(1.1); }

        .zona-icono { font-size: 3rem; }

        .elementos-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            min-height: 120px;
        }

        .ficha {
            width: 120px;
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 6px 0 #ccc;
            text-align: center;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        .ficha:active { cursor: grabbing; }

        .ficha-emoji { font-size: 2.5rem; display: block; }

        /* --- MODAL RANKING --- */
        #modal-ranking {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            padding: 20px;
        }

        .modal-contenido {
            background: #fff;
            max-width: 600px;
            margin: 20px auto;
            border-radius: 30px;
            padding: 30px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .tarjeta-estudiante {
            background: #f9f9f9;
            border-left: 10px solid var(--azul);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 0 #eee;
        }

        /* --- ANIMACIONES --- */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .confeti {
            position: fixed;
            width: 10px; height: 10px;
            background: red;
            z-index: 1000;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        .hidden { display: none !important; }

        .btn-ui {
            padding: 10px 20px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }

        @media (max-width: 600px) {
            .titulo-app { font-size: 2rem; }
            .zona { width: 130px; height: 130px; }
        }
    </style>
</head>
<body>

    <section id="portada">
        <h1 class="titulo-app">🌟 Aventuras del Saber 🌟</h1>
        <h2 style="color: white; margin-bottom: 15px;">Arrastra y Aprende</h2>
        
        <div class="info-docente">
            <p><strong>Nombre:</strong> Lucelis de la rosa</p>
            <p><strong>Docente:</strong> Javier zapata</p>
            <p><strong>Universidad del Magdalena</strong> - 2026</p>
        </div>

        <input type="text" id="nombre-estudiante" class="input-nombre" placeholder="Escribe tu nombre aquí..." required>
        <br>
        <button class="btn-inicio" onclick="iniciarJuego()">¡A JUGAR! 🚀</button>
        <br>
        <button class="btn-ui" style="background: var(--amarillo);" onclick="abrirRanking()">👧👦 Estudiantes</button>
    </section>

    <section id="juego">
        <div class="header-juego">
            <div class="stat-card">👤: <span id="display-nombre"></span></div>
            <div class="stat-card">⭐: <span id="display-estrellas">0</span></div>
            <div class="stat-card">🏆 Puntos: <span id="display-puntos">0</span></div>
            <div class="stat-card">🔄 Intentos: <span id="display-intentos">0</span></div>
        </div>

        <div class="instrucciones" id="texto-instrucciones">Cargando instrucciones...</div>

        <div class="zonas-container" id="contenedor-zonas">
            </div>

        <div class="elementos-container" id="contenedor-fichas">
            </div>

        <div style="text-align: center; margin-top: 30px;">
            <button class="btn-ui" style="background: var(--naranja); color: white;" onclick="reiniciarNivel()">🔄 Reiniciar</button>
            <button class="btn-ui" style="background: var(--azul); color: white;" id="btn-siguiente" onclick="siguienteNivel()" class="hidden">¡Siguiente Nivel! ➡️</button>
            <button class="btn-ui" style="background: var(--morado); color: white;" onclick="irAlMenu()">🏠 Menú</button>
        </div>
    </section>

    <div id="modal-ranking">
        <div class="modal-contenido">
            <h2 style="text-align: center; color: var(--azul);">🏆 Tabla de Honor</h2>
            <hr style="margin: 15px 0;">
            <div id="lista-estudiantes">
                </div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn-ui" style="background: var(--verde); color: white;" onclick="abrirRanking()">Actualizar</button>
                <button class="btn-ui" style="background: var(--rosado); color: white;" onclick="borrarRanking()">Borrar Todo</button>
                <button class="btn-ui" style="background: #333; color: white;" onclick="cerrarRanking()">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * CONFIGURACIÓN DE ACTIVIDADES
         * Aquí puedes cambiar fácilmente los temas del juego.
         */
        const ACTIVIDADES = [
            {
                tema: "Las Vocales",
                instrucciones: "Arrastra cada dibujo a su vocal inicial",
                zonas: [
                    { id: "a", nombre: "Vocal A", icono: "🅰️", color: "#FF5722" },
                    { id: "e", nombre: "Vocal E", icono: "📧", color: "#2196F3" },
                    { id: "i", nombre: "Vocal I", icono: "🍦", color: "#9C27B0" }
                ],
                elementos: [
                    { id: "1", nombre: "Avión", emoji: "✈️", destino: "a" },
                    { id: "2", nombre: "Elefante", emoji: "🐘", destino: "e" },
                    { id: "3", nombre: "Isla", emoji: "🏝️", destino: "i" },
                    { id: "4", nombre: "Abeja", emoji: "🐝", destino: "a" },
                    { id: "5", nombre: "Estrella", emoji: "⭐", destino: "e" }
                ]
            },
            {
                tema: "Los Colores",
                instrucciones: "Pon cada objeto en su color correcto",
                zonas: [
                    { id: "rojo", nombre: "Rojo", icono: "🔴", color: "#f44336" },
                    { id: "azul", nombre: "Azul", icono: "🔵", color: "#2196F3" },
                    { id: "amarillo", nombre: "Amarillo", icono: "🟡", color: "#ffeb3b" }
                ],
                elementos: [
                    { id: "c1", nombre: "Manzana", emoji: "🍎", destino: "rojo" },
                    { id: "c2", nombre: "Ballena", emoji: "🐳", destino: "azul" },
                    { id: "c3", nombre: "Banano", emoji: "🍌", destino: "amarillo" },
                    { id: "c4", nombre: "Corazón", emoji: "❤️", destino: "rojo" }
                ]
            },
            {
                tema: "Contando del 1 al 5",
                instrucciones: "¿Cuántos hay? Arrastra al número correcto",
                zonas: [
                    { id: "n1", nombre: "Uno", icono: "1️⃣", color: "#4CAF50" },
                    { id: "n3", nombre: "Tres", icono: "3️⃣", color: "#FF9800" },
                    { id: "n5", nombre: "Cinco", icono: "5️⃣", color: "#E91E63" }
                ],
                elementos: [
                    { id: "x1", nombre: "Un Sol", emoji: "☀️", destino: "n1" },
                    { id: "x3", nombre: "Tres Dedos", emoji: "🤟", destino: "n3" },
                    { id: "x5", nombre: "Cinco Dedos", emoji: "🖐️", destino: "n5" }
                ]
            }
        ];

        // --- VARIABLES DE ESTADO ---
        let nivelActual = 0;
        let puntos = 0;
        let intentos = 0;
        let aciertosNivel = 0;
        let nombreJugador = "";
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // --- LÓGICA DE AUDIO (Sintetizado) ---
        function sonar(frec, tipo = 'sine', dur = 0.2) {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = tipo;
            osc.frequency.setValueAtTime(frec, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        // --- FUNCIONES DEL JUEGO ---
        function iniciarJuego() {
            const input = document.getElementById('nombre-estudiante');
            if (input.value.trim() === "") {
                alert("¡Hola! Por favor escribe tu nombre para empezar.");
                return;
            }
            nombreJugador = input.value.trim();
            document.getElementById('display-nombre').innerText = nombreJugador;
            document.getElementById('portada').style.display = 'none';
            document.getElementById('juego').style.display = 'block';
            cargarNivel();
        }

        function cargarNivel() {
            const nivel = ACTIVIDADES[nivelActual];
            document.getElementById('texto-instrucciones').innerText = nivel.instrucciones;
            aciertosNivel = 0;
            
            // Renderizar Zonas
            const contenedorZonas = document.getElementById('contenedor-zonas');
            contenedorZonas.innerHTML = '';
            nivel.zonas.forEach(z => {
                const div = document.createElement('div');
                div.className = 'zona';
                div.id = `zona-${z.id}`;
                div.style.borderColor = z.color;
                div.innerHTML = `<span class="zona-icono">${z.icono}</span><b>${z.nombre}</b>`;
                
                // Eventos Drag/Drop
                div.ondragover = (e) => { e.preventDefault(); div.classList.add('highlight'); };
                div.ondragleave = () => div.classList.remove('highlight');
                div.ondrop = (e) => manejarDrop(e, z.id);
                contenedorZonas.appendChild(div);
            });

            // Renderizar Fichas
            const contenedorFichas = document.getElementById('contenedor-fichas');
            contenedorFichas.innerHTML = '';
            // Mezclar elementos para que no salgan en orden
            const elementosMezclados = [...nivel.elementos].sort(() => Math.random() - 0.5);
            
            elementosMezclados.forEach(el => {
                const div = document.createElement('div');
                div.className = 'ficha';
                div.draggable = true;
                div.id = `ficha-${el.id}`;
                div.innerHTML = `<span class="ficha-emoji">${el.emoji}</span>${el.nombre}`;
                
                div.ondragstart = (e) => {
                    e.dataTransfer.setData("fichaId", el.id);
                    e.dataTransfer.setData("destino", el.destino);
                };
                contenedorFichas.appendChild(div);
            });
            
            document.getElementById('btn-siguiente').classList.add('hidden');
        }

        function manejarDrop(e, zonaId) {
            e.preventDefault();
            const fichaId = e.dataTransfer.getData("fichaId");
            const destinoCorrecto = e.dataTransfer.getData("destino");
            const zonaElem = document.getElementById(`zona-${zonaId}`);
            zonaElem.classList.remove('highlight');

            intentos++;
            document.getElementById('display-intentos').innerText = intentos;

            if (zonaId === destinoCorrecto) {
                // ACIERTO
                sonar(523.25, 'triangle'); // Nota Do
                puntos += 10;
                aciertosNivel++;
                document.getElementById(`ficha-${fichaId}`).style.visibility = 'hidden';
                alertar("¡Excelente! ✨");
                
                if (aciertosNivel === ACTIVIDADES[nivelActual].elementos.length) {
                    finalizarNivel();
                }
            } else {
                // ERROR
                sonar(261.63, 'sawtooth'); // Nota Do grave
                puntos = Math.max(0, puntos - 2);
                alertar("Casi, ¡intenta otra vez! 💪");
            }
            actualizarMarcador();
        }

        function alertar(msg) {
            // Un mensaje simple que no bloquee mucho el flujo
            const display = document.getElementById('texto-instrucciones');
            const original = display.innerText;
            display.innerText = msg;
            display.style.background = "#FFF";
            setTimeout(() => {
                display.innerText = original;
                display.style.background = "var(--amarillo)";
            }, 1500);
        }

        function actualizarMarcador() {
            document.getElementById('display-puntos').innerText = puntos;
        }

        function finalizarNivel() {
            crearConfeti();
            sonar(659.25, 'sine', 0.5); // Mi
            
            // Cálculo de estrellas
            let estrellas = 1;
            const totalElementos = ACTIVIDADES[nivelActual].elementos.length;
            if (intentos <= totalElementos + 2) estrellas = 3;
            else if (intentos <= totalElementos + 5) estrellas = 2;

            document.getElementById('display-estrellas').innerText = "⭐".repeat(estrellas);
            
            if (nivelActual < ACTIVIDADES.length - 1) {
                document.getElementById('btn-siguiente').classList.remove('hidden');
            } else {
                guardarResultado(estrellas);
                alert(`¡Felicidades ${nombreJugador}! Has terminado todas las aventuras.`);
            }
        }

        function siguienteNivel() {
            nivelActual++;
            intentos = 0;
            document.getElementById('display-intentos').innerText = "0";
            cargarNivel();
        }

        function reiniciarNivel() {
            intentos = 0;
            puntos = Math.max(0, puntos - 20); // Penalidad pequeña por reiniciar
            actualizarMarcador();
            cargarNivel();
        }

        function irAlMenu() {
            if(confirm("¿Quieres volver al inicio? Se perderá el progreso actual.")) {
                location.reload();
            }
        }

        // --- SISTEMA DE ALMACENAMIENTO (LocalStorage) ---
        function guardarResultado(numEstrellas) {
            const resultados = JSON.parse(localStorage.getItem('aventuras_ranking') || '[]');
            const nuevo = {
                nombre: nombreJugador,
                tema: ACTIVIDADES.map(a => a.tema).join(", "),
                puntos: puntos,
                estrellas: numEstrellas,
                intentos: intentos,
                fecha: new Date().toLocaleDateString()
            };
            resultados.push(nuevo);
            localStorage.setItem('aventuras_ranking', JSON.stringify(resultados));
        }

        function abrirRanking() {
            const modal = document.getElementById('modal-ranking');
            const lista = document.getElementById('lista-estudiantes');
            modal.style.display = 'block';
            
            let datos = JSON.parse(localStorage.getItem('aventuras_ranking') || '[]');
            
            // Ordenar: Estrellas > Puntos > Menos Intentos
            datos.sort((a, b) => b.estrellas - a.estrellas || b.puntos - a.puntos || a.intentos - b.intentos);

            lista.innerHTML = datos.length === 0 ? "<p>No hay registros todavía.</p>" : "";

            datos.forEach((est, index) => {
                const medalla = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : "👤";
                lista.innerHTML += `
                    <div class="tarjeta-estudiante">
                        <h3>${medalla} ${est.nombre}</h3>
                        <p><b>Temas:</b> ${est.tema}</p>
                        <p><b>Estrellas:</b> ${"⭐".repeat(est.estrellas)} | <b>Puntos:</b> ${est.puntos}</p>
                        <p><small>Intentos: ${est.intentos} | Fecha: ${est.fecha}</small></p>
                    </div>
                `;
            });
        }

        function cerrarRanking() {
            document.getElementById('modal-ranking').style.display = 'none';
        }

        function borrarRanking() {
            if(confirm("¿Seguro que quieres borrar todos los datos de los estudiantes?")) {
                localStorage.removeItem('aventuras_ranking');
                abrirRanking();
            }
        }

        // --- EFECTOS VISUALES ---
        function crearConfeti() {
            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.className = 'confeti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = ['#FFEB3B', '#FF9800', '#E91E63', '#2196F3', '#4CAF50'][Math.floor(Math.random()*5)];
                c.style.animationDuration = (Math.random() * 3 + 2) + 's';
                c.style.opacity = Math.random();
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 5000);
            }
        }
    </script>
</body>
